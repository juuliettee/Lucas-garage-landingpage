<!-- temporary views for testing database connection and image uploads, will be replaced with more polished versions in the future -->
{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-16 text-center">
    <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-4">
        Luca's Garage London
    </h1>
    <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-12">
        Professional vehicle servicing, mechanical repairs, and hand-picked quality used cars for sale.
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto mb-12">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center">
            <span class="text-sm font-semibold text-blue-600 uppercase tracking-wider mb-2">Speak to a Mechanic</span>
            <a href="tel:02079460192" class="text-2xl font-bold text-gray-900 hover:text-blue-600 transition">
                020 7946 0192
            </a>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center">
            <span class="text-sm font-semibold text-blue-600 uppercase tracking-wider mb-2">General Enquiries</span>
            <a href="mailto:info@lucasgarage.co.uk"
                class="text-lg font-semibold text-gray-900 hover:text-blue-600 transition truncate w-full">
                info@lucasgarage.co.uk
            </a>
        </div>
    </div>

    <div>
        <a href="{{ url_for('cars') }}"
            class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold text-lg px-8 py-4 rounded-xl shadow-lg shadow-blue-500/20 transition transform hover:-translate-y-0.5">
            Browse Active Used Cars Stock
        </a>
    </div>
</div>
{% endblock %}
